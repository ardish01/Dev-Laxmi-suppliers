<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>500 Internal Server Error</title>
  <meta name="robots" content="noindex" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #f8f9fa;
      color: #6c757d;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }

    .code {
      font-size: clamp(5rem, 15vw, 9rem);
      font-weight: 600;
      color: #e9ecef;
      line-height: 1;
      margin-bottom: 1rem;
      user-select: none;
    }

    h1 { font-size: 1.1rem; font-weight: 400; color: #adb5bd; margin-bottom: 0.5rem; }
    p { font-size: 0.85rem; color: #adb5bd; max-width: 360px; }

    a {
      display: inline-block;
      margin-top: 2rem;
      padding: 0.6rem 1.4rem;
      background: #ffffff;
      border: 1px solid #dee2e6;
      border-radius: 6px;
      color: #6c757d;
      text-decoration: none;
      font-size: 0.82rem;
      transition: border-color 0.2s, color 0.2s;
    }

    a:hover { border-color: #2563eb; color: #2563eb; }
  </style>
</head>
<body>
  <div class="code" aria-hidden="true">500</div>
  <h1>Internal Server Error</h1>
  <p>Something went wrong on our end. Please try again in a moment.</p>
  <a href="/">← Return to Home</a>
</body>
</html>
